<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All-Time Elo Leaderboard - United Emu Friends Association</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #2d7a5f;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 80%;
      margin: 0 auto;
      background-color: #1e5c47;
      border-radius: 16px;
      padding: 36px 32px 48px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .subtitle {
      color: #a8d5c2;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid #3a8c6e;
      background-color: #163f2e;
      color: #ffffff;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box::placeholder { color: #6aaa8e; }
    .search-box:focus { border-color: #7ecba8; }

    .row-count {
      color: #a8d5c2;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
      table-layout: fixed;
    }

    col.col-rank   { width: 10%; }
    col.col-flag   { width: 10%; }
    col.col-name   { width: 30%; }
    col.col-elo    { width: 15%; }
    col.col-date   { width: 25%; }
    col.col-arena  { width: 10%; }

    thead tr { background-color: #163f2e; }

    thead th {
      color: #ffffff;
      font-weight: 700;
      padding: 12px 14px;
      text-align: center;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.15s;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    thead th:hover { background-color: #0f2e20; }

    thead th .sort-icon {
      display: inline-block;
      margin-left: 5px;
      opacity: 0.4;
      font-size: 0.75em;
    }

    thead th.sorted-asc .sort-icon,
    thead th.sorted-desc .sort-icon { opacity: 1; color: #7ecba8; }

    tbody tr {
      border-bottom: 1px solid #2a6e54;
      transition: background-color 0.12s;
    }

    tbody tr:hover { background-color: #265c45; }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 10px 14px;
      color: #e8f5f0;
      text-align: center;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td.rank { color: #a8d5c2; font-size: 0.85rem; font-weight: 600; }
    td.flag { font-size: 1.3rem; }

    td.player { text-align: center; }
    td.player a {
      color: #6ab4f5;
      text-decoration: underline;
      font-weight: 600;
      text-underline-offset: 2px;
    }
    td.player a:hover { color: #9ecfff; }

    td.elo { font-weight: 800; font-size: 1rem; color: #ffffff; }

    td.arena { font-weight: 400; }
    td.arena.gold   { background-color: #d4a017; color: #1a1a1a; }
    td.arena.silver { background-color: #a0a0a0; color: #1a1a1a; }
    td.arena.bronze { background-color: #c07840; color: #1a1a1a; }

    .status {
      text-align: center;
      padding: 40px;
      color: #a8d5c2;
      font-size: 0.95rem;
    }

    .status.error { color: #f08080; }

    .no-results {
      text-align: center;
      padding: 30px;
      color: #6aaa8e;
      font-style: italic;
    }

    @media (max-width: 768px) {
      .container { max-width: 100%; padding: 24px 14px 36px; }
      h1 { font-size: 1.4rem; }
      thead th, tbody td { padding: 9px 8px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>All-Time Elo Leaderboard</h1>
  <p class="subtitle">Ark Nova &middot; Masters &middot; Auto-updated from live data</p>

  <div class="controls">
    <input type="text" class="search-box" id="searchBox" placeholder="Search players..." oninput="filterTable()" />
    <span class="row-count" id="rowCount"></span>
  </div>

  <div class="table-wrapper">
    <table id="leaderboard">
      <colgroup>
        <col class="col-rank" />
        <col class="col-flag" />
        <col class="col-name" />
        <col class="col-elo" />
        <col class="col-date" />
        <col class="col-arena" />
      </colgroup>
      <thead>
        <tr>
          <th data-col="rank">#</th>
          <th>Flag</th>
          <th data-col="2" onclick="sortTable(2)">BGA Name<span class="sort-icon">&#8645;</span></th>
          <th data-col="5" onclick="sortTable(5)">Peak Elo<span class="sort-icon">&#8645;</span></th>
          <th data-col="6" onclick="sortTable(6)">Date<span class="sort-icon">&#8645;</span></th>
          <th data-col="7" onclick="sortTable(7)">Peak Arena<span class="sort-icon">&#8645;</span></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6" class="status">Loading leaderboard...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoBpCOm-JQcBhkhpcfak7PiHUwsw2oCbvHGjzGn4gTATaK6X6feEZnH6xn3cmNT8X00PPXgowx8gb4/pub?gid=403684240&single=true&output=csv";

  // Sheet column indices (0-based):
  // A=0 flag image (skip), B=1 country code, C=2 BGA name,
  // D=3 filter (hide if "1"), E=4 ignore,
  // F=5 Peak Elo, G=6 Date, H=7 Peak Arena, I=8 Season (not shown)
  var IDX_COUNTRY = 1;
  var IDX_NAME    = 2;
  var IDX_FILTER  = 3;
  var IDX_ELO     = 5;
  var IDX_DATE    = 6;
  var IDX_ARENA   = 7;

  function countryCodeToFlag(code) {
    if (!code || code.trim() === "") return "";
    var cc = code.trim().toUpperCase();
    if (cc.length !== 2) return "";
    var chars = [];
    for (var i = 0; i < cc.length; i++) {
      chars.push(String.fromCodePoint(0x1F1E6 + cc.charCodeAt(i) - 65));
    }
    return chars.join('');
  }

  function parseCSV(text) {
    var rows = [];
    var lines = text.split(/\r?\n/);
    for (var li = 0; li < lines.length; li++) {
      var line = lines[li];
      if (!line.trim()) continue;
      var cols = [];
      var cur = "";
      var inQ = false;
      for (var i = 0; i < line.length; i++) {
        var ch = line[i];
        if (ch === '"') {
          inQ = !inQ;
        } else if (ch === ',' && !inQ) {
          cols.push(cur);
          cur = "";
        } else {
          cur += ch;
        }
      }
      cols.push(cur);
      rows.push(cols);
    }
    return rows;
  }

  var allRows = [];
  var sortColIndex = -1;
  var sortAsc = true;

  function loadData() {
    fetch(SHEET_CSV_URL)
      .then(function(resp) {
        if (!resp.ok) throw new Error("Network error: " + resp.status);
        return resp.text();
      })
      .then(function(text) {
        var rows = parseCSV(text);
        if (rows.length < 2) throw new Error("No data found in sheet");
        allRows = rows.slice(1).filter(function(r) {
          if (!r.some(function(c) { return c.trim(); })) return false;
          if ((r[IDX_FILTER] || "").trim() === "1") return false;
          return true;
        });
        renderTable(allRows);
      })
      .catch(function(e) {
        document.getElementById("tableBody").innerHTML =
          '<tr><td colspan="6" class="status error">Could not load data. Please try refreshing.<br><small>' + e.message + '</small></td></tr>';
      });
  }

  function renderTable(rows) {
    var tbody = document.getElementById("tableBody");
    if (rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="no-results">No players match your search.</td></tr>';
      document.getElementById("rowCount").textContent = "0 players";
      return;
    }

    var html = "";
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      var countryCode = (row[IDX_COUNTRY] || "").trim();
      var flag        = countryCodeToFlag(countryCode);
      var name        = (row[IDX_NAME]    || "").trim();
      var elo         = (row[IDX_ELO]     || "").trim();
      var date        = (row[IDX_DATE]    || "").trim();
      var arena       = (row[IDX_ARENA]   || "").trim();

      var arenaNum = parseInt(arena, 10);
      var arenaClass = "";
      if (arenaNum === 1) arenaClass = "gold";
      else if (arenaNum === 2) arenaClass = "silver";
      else if (arenaNum === 3) arenaClass = "bronze";

      html += '<tr>';
      html += '<td class="rank">' + (i + 1) + '</td>';
      html += '<td class="flag">' + flag + '</td>';
      html += '<td class="player">' + name + '</td>';
      html += '<td class="elo">' + elo + '</td>';
      html += '<td>' + date + '</td>';
      html += '<td class="arena ' + arenaClass + '">' + arena + '</td>';
      html += '</tr>';
    }

    tbody.innerHTML = html;
    var total = rows.length;
    document.getElementById("rowCount").textContent = total + " player" + (total !== 1 ? "s" : "");
  }

  function filterTable() {
    var query = document.getElementById("searchBox").value.toLowerCase();
    var filtered = allRows.filter(function(row) {
      return row.join(" ").toLowerCase().indexOf(query) !== -1;
    });
    renderTable(filtered);
  }

  function sortTable(dataIdx) {
    if (sortColIndex === dataIdx) {
      sortAsc = !sortAsc;
    } else {
      sortColIndex = dataIdx;
      sortAsc = (dataIdx !== 5);
    }

    allRows.sort(function(a, b) {
      var va = (a[dataIdx] || "").trim();
      var vb = (b[dataIdx] || "").trim();
      var na = parseFloat(va);
      var nb = parseFloat(vb);
      var cmp;
      if (!isNaN(na) && !isNaN(nb)) {
        cmp = na - nb;
      } else {
        cmp = va.localeCompare(vb);
      }
      return sortAsc ? cmp : -cmp;
    });

    var ths = document.querySelectorAll("thead th");
    for (var i = 0; i < ths.length; i++) {
      ths[i].classList.remove("sorted-asc", "sorted-desc");
      var icon = ths[i].querySelector(".sort-icon");
      if (icon) icon.innerHTML = "&#8645;";
    }
    var sortedTh = document.querySelector('thead th[data-col="' + dataIdx + '"]');
    if (sortedTh) {
      sortedTh.classList.add(sortAsc ? "sorted-asc" : "sorted-desc");
      var icon2 = sortedTh.querySelector(".sort-icon");
      if (icon2) icon2.innerHTML = sortAsc ? "&#8593;" : "&#8595;";
    }

    filterTable();
  }

  loadData();
</script>
</body>
</html>
